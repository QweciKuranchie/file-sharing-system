{% extends 'base.html' %}

{% block title %}Dashboard | CloudSync{% endblock %}

{% block content %}
<div style="text-align: center; padding: 4rem 2rem; max-width: 600px; margin: 0 auto;">
    <div class="glass-card" style="padding: 3rem 2rem;">
        <div style="margin-bottom: 1.5rem;">
            <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="filter: drop-shadow(0 0 8px var(--accent-glow));">
                <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                <line x1="9" y1="3" x2="9" y2="21"></line>
            </svg>
        </div>
        <h1 class="auth-title" style="font-size: 2.2rem; margin-bottom: 1rem;">Dashboard</h1>
        <p style="color: var(--text-primary); font-weight: 500; margin-bottom: 0.5rem;">Welcome back, <span style="color: var(--accent);">{{ g.user.username }}</span>!</p>
        <p style="color: var(--text-secondary); font-size: 0.95rem; margin-bottom: 2rem;">Your email is: {{ g.user.email }}</p>
        
        <div style="border-top: 1px solid var(--glass-border); padding-top: 1.5rem; color: var(--text-muted); font-size: 0.85rem;">
            Dashboard file lists (FE-3) and file operations (FE-2) will be implemented in the next phases.
        </div>
    </div>
</div>
{% endblock %}
