<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 620" width="900" height="620" font-family="Arial, sans-serif">

  <!-- Background -->
  <rect width="900" height="620" fill="#F8FAFD" rx="12"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-size="18" font-weight="bold" fill="#1F4E79">System Architecture — Distributed File-Sharing System</text>
  <text x="450" y="58" text-anchor="middle" font-size="12" fill="#666">Group 4 | Networking &amp; Distributed Systems</text>
  <line x1="60" y1="68" x2="840" y2="68" stroke="#2E75B6" stroke-width="1.5"/>

  <!-- ═══ ZONE LABELS ═══ -->
  <!-- Client Zone -->
  <rect x="30" y="82" width="840" height="120" rx="10" fill="#EBF3FB" stroke="#2E75B6" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="48" y="100" font-size="11" font-weight="bold" fill="#2E75B6">CLIENT ZONE</text>

  <!-- Server Zone -->
  <rect x="30" y="230" width="840" height="200" rx="10" fill="#E8F5E9" stroke="#388E3C" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="48" y="248" font-size="11" font-weight="bold" fill="#388E3C">SERVER ZONE (Local Area Network)</text>

  <!-- Storage Zone -->
  <rect x="30" y="452" width="840" height="120" rx="10" fill="#FFF3E0" stroke="#E65100" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="48" y="470" font-size="11" font-weight="bold" fill="#E65100">STORAGE ZONE</text>

  <!-- ═══ CLIENT BROWSERS ═══ -->
  <!-- Client 1 -->
  <rect x="60" y="108" width="120" height="70" rx="8" fill="#2E75B6" stroke="#1F4E79" stroke-width="1.5"/>
  <text x="120" y="135" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Client 1</text>
  <text x="120" y="152" text-anchor="middle" font-size="10" fill="#BDD7EE">Web Browser</text>
  <text x="120" y="167" text-anchor="middle" font-size="10" fill="#BDD7EE">Laptop A</text>

  <!-- Client 2 -->
  <rect x="210" y="108" width="120" height="70" rx="8" fill="#2E75B6" stroke="#1F4E79" stroke-width="1.5"/>
  <text x="270" y="135" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Client 2</text>
  <text x="270" y="152" text-anchor="middle" font-size="10" fill="#BDD7EE">Web Browser</text>
  <text x="270" y="167" text-anchor="middle" font-size="10" fill="#BDD7EE">Laptop B</text>

  <!-- Client 3 -->
  <rect x="360" y="108" width="120" height="70" rx="8" fill="#2E75B6" stroke="#1F4E79" stroke-width="1.5"/>
  <text x="420" y="135" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Client 3</text>
  <text x="420" y="152" text-anchor="middle" font-size="10" fill="#BDD7EE">Web Browser</text>
  <text x="420" y="167" text-anchor="middle" font-size="10" fill="#BDD7EE">Laptop C</text>

  <!-- Client N -->
  <rect x="510" y="108" width="120" height="70" rx="8" fill="#5B8DB8" stroke="#2E75B6" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="570" y="135" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Client N</text>
  <text x="570" y="152" text-anchor="middle" font-size="10" fill="#BDD7EE">Web Browser</text>
  <text x="570" y="167" text-anchor="middle" font-size="10" fill="#BDD7EE">Any Laptop</text>

  <!-- ═══ FLASK WEB APP ═══ -->
  <rect x="310" y="258" width="280" height="80" rx="8" fill="#1F4E79" stroke="#0D2B4E" stroke-width="2"/>
  <text x="450" y="285" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Flask Web App</text>
  <text x="450" y="303" text-anchor="middle" font-size="10" fill="#BDD7EE">app.py | auth.py</text>
  <text x="450" y="320" text-anchor="middle" font-size="10" fill="#BDD7EE">Session Auth | HTTP Routing | UI Templates</text>

  <!-- ═══ PRIMARY SERVER ═══ -->
  <rect x="80" y="258" width="190" height="80" rx="8" fill="#388E3C" stroke="#1B5E20" stroke-width="2"/>
  <text x="175" y="283" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Primary Server</text>
  <text x="175" y="301" text-anchor="middle" font-size="10" fill="#C8E6C9">primary_server.py</text>
  <text x="175" y="318" text-anchor="middle" font-size="10" fill="#C8E6C9">TCP Socket | Threading</text>

  <!-- ═══ REPLICA SERVER ═══ -->
  <rect x="630" y="258" width="190" height="80" rx="8" fill="#F57C00" stroke="#E65100" stroke-width="2"/>
  <text x="725" y="283" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Replica Server</text>
  <text x="725" y="301" text-anchor="middle" font-size="10" fill="#FFE0B2">replica_server.py</text>
  <text x="725" y="318" text-anchor="middle" font-size="10" fill="#FFE0B2">TCP Socket | Threading</text>

  <!-- ═══ REPLICATION MODULE ═══ -->
  <rect x="310" y="368" width="280" height="52" rx="8" fill="#6A1B9A" stroke="#4A148C" stroke-width="1.5"/>
  <text x="450" y="391" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Replication Module</text>
  <text x="450" y="409" text-anchor="middle" font-size="10" fill="#E1BEE7">replication.py | Auto-sync + Failover Logic</text>

  <!-- ═══ STORAGE ═══ -->
  <!-- Primary Storage -->
  <rect x="80" y="472" width="190" height="80" rx="8" fill="#E65100" stroke="#BF360C" stroke-width="1.5"/>
  <text x="175" y="500" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Primary Storage</text>
  <text x="175" y="518" text-anchor="middle" font-size="10" fill="#FFE0B2">/shared_files/</text>
  <text x="175" y="534" text-anchor="middle" font-size="10" fill="#FFE0B2">Filesystem on Primary Machine</text>

  <!-- Replica Storage -->
  <rect x="630" y="472" width="190" height="80" rx="8" fill="#E65100" stroke="#BF360C" stroke-width="1.5"/>
  <text x="725" y="500" text-anchor="middle" font-size="12" font-weight="bold" fill="white">Replica Storage</text>
  <text x="725" y="518" text-anchor="middle" font-size="10" fill="#FFE0B2">/shared_files/</text>
  <text x="725" y="534" text-anchor="middle" font-size="10" fill="#FFE0B2">Filesystem on Replica Machine</text>

  <!-- ═══ ARROWS ═══ -->

  <!-- Clients → Flask (HTTP) -->
  <line x1="120" y1="178" x2="380" y2="258" stroke="#2E75B6" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="270" y1="178" x2="420" y2="258" stroke="#2E75B6" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="420" y1="178" x2="450" y2="258" stroke="#2E75B6" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <line x1="570" y1="178" x2="500" y2="258" stroke="#2E75B6" stroke-width="1.5" marker-end="url(#arrowBlue)"/>
  <text x="220" y="226" font-size="10" fill="#2E75B6" font-weight="bold">HTTP Requests (Login, Upload, Download, List, Delete)</text>

  <!-- Flask ↔ Primary -->
  <line x1="310" y1="298" x2="270" y2="298" stroke="#1F4E79" stroke-width="2" marker-end="url(#arrowDark)" marker-start="url(#arrowDarkR)"/>
  <text x="185" y="245" font-size="10" fill="#1F4E79" font-weight="bold">TCP Socket</text>

  <!-- Primary → Replication -->
  <line x1="175" y1="338" x2="340" y2="368" stroke="#388E3C" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrowGreen)"/>

  <!-- Flask ↔ Replication -->
  <line x1="450" y1="338" x2="450" y2="368" stroke="#6A1B9A" stroke-width="1.5" marker-end="url(#arrowPurple)"/>

  <!-- Replication → Replica -->
  <line x1="590" y1="390" x2="630" y2="320" stroke="#6A1B9A" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arrowPurple)"/>
  <text x="590" y="355" font-size="10" fill="#6A1B9A" font-weight="bold">Auto Replicate</text>

  <!-- Flask → Replica (failover) -->
  <line x1="590" y1="298" x2="630" y2="298" stroke="#F57C00" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arrowOrange)"/>
  <text x="597" y="290" font-size="9" fill="#F57C00">Failover</text>

  <!-- Primary → Primary Storage -->
  <line x1="175" y1="338" x2="175" y2="472" stroke="#E65100" stroke-width="1.5" marker-end="url(#arrowRed)"/>

  <!-- Replica → Replica Storage -->
  <line x1="725" y1="338" x2="725" y2="472" stroke="#E65100" stroke-width="1.5" marker-end="url(#arrowRed)"/>

  <!-- ═══ ARROW MARKERS ═══ -->
  <defs>
    <marker id="arrowBlue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#2E75B6"/>
    </marker>
    <marker id="arrowDark" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#1F4E79"/>
    </marker>
    <marker id="arrowDarkR" markerWidth="8" markerHeight="8" refX="2" refY="3" orient="auto-start-reverse">
      <path d="M0,0 L0,6 L8,3 z" fill="#1F4E79"/>
    </marker>
    <marker id="arrowGreen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#388E3C"/>
    </marker>
    <marker id="arrowPurple" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6A1B9A"/>
    </marker>
    <marker id="arrowOrange" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#F57C00"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#E65100"/>
    </marker>
  </defs>

  <!-- ═══ LEGEND ═══ -->
  <rect x="650" y="82" width="210" height="130" rx="8" fill="white" stroke="#CCCCCC" stroke-width="1"/>
  <text x="755" y="100" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Legend</text>
  <line x1="665" y1="112" x2="695" y2="112" stroke="#2E75B6" stroke-width="2"/>
  <text x="700" y="116" font-size="10" fill="#333">HTTP (Client ↔ Flask)</text>
  <line x1="665" y1="128" x2="695" y2="128" stroke="#1F4E79" stroke-width="2"/>
  <text x="700" y="132" font-size="10" fill="#333">TCP Socket</text>
  <line x1="665" y1="144" x2="695" y2="144" stroke="#6A1B9A" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="700" y="148" font-size="10" fill="#333">Replication</text>
  <line x1="665" y1="160" x2="695" y2="160" stroke="#F57C00" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="700" y="164" font-size="10" fill="#333">Failover</text>
  <line x1="665" y1="176" x2="695" y2="176" stroke="#E65100" stroke-width="2"/>
  <text x="700" y="180" font-size="10" fill="#333">File Storage</text>
  <line x1="665" y1="192" x2="695" y2="192" stroke="#388E3C" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="700" y="196" font-size="10" fill="#333">Triggers Replication</text>

</svg>
